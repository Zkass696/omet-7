<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar OMET</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

    <div class="auth-container">
        <h2>Daftar Anggota</h2>
        <p class="subtitle">Buat akun untuk akses mobilitas</p>
        
        <form id="registerForm">
            <div class="input-group">
                <label>Nama Lengkap</label>
                <input type="text" id="regNama" placeholder="Nama Lengkap" required>
            </div>
            <div class="input-group">
                <label>Kelas</label>
                <input type="text" id="regKelas" placeholder="Contoh: XI-A" required>
            </div>
            <div class="input-group">
                <label>Jabatan</label>
                <input type="text" id="regJabatan" placeholder="Contoh: Bendahara" required>
            </div>
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="regUser" placeholder="Username untuk login" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="regPass" placeholder="Min 8 karakter (huruf + angka)" required>
                <i class="fas fa-eye eye-icon" onclick="togglePass('regPass', this)"></i>
            </div>
            <div class="input-group">
                <label>Konfirmasi Password</label>
                <input type="password" id="regPassConfirm" placeholder="Ketik ulang password" required>
                <i class="fas fa-eye eye-icon" onclick="togglePass('regPassConfirm', this)"></i>
            </div>
            
            <button type="submit" class="btn-utama">Daftar Sekarang</button>
        </form>

        <p class="auth-footer">
            Sudah punya akun? <a href="login.html">Login</a>
        </p>
    </div>

    <script>
        function togglePass(id, el) {
            const x = document.getElementById(id);
            if (x.type === "password") {
                x.type = "text";
                el.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                x.type = "password";
                el.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const user = document.getElementById('regUser').value;
            const pass = document.getElementById('regPass').value;
            const confirm = document.getElementById('regPassConfirm').value;
            const nama = document.getElementById('regNama').value;

            // REGEX: Minimal 8 karakter, harus ada Huruf DAN Angka
            const passRegex = /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{8,}$/;

            if (!passRegex.test(pass)) {
                alert('Password tidak valid! Minimal 8 karakter dan harus kombinasi huruf & angka.');
                return;
            }

            if (pass !== confirm) {
                alert('Password konfirmasi tidak cocok!');
                return;
            }

            // Simpan Data ke HP
            localStorage.setItem('savedUser', user);
            localStorage.setItem('savedPass', pass);
            localStorage.setItem('savedNama', nama);
const jabatan = document.getElementById('regJabatan').value; // Ambil nilai jabatan
localStorage.setItem('savedJabatan', jabatan); // Simpan


            alert('Akun Berhasil Dibuat! Silakan Login.');
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
