<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard OMET</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-header">
        <div class="user-info-box">
            <span class="text-welcome">Selamat Datang,</span>
            <span class="text-username" id="displayNama">Anggota OMET</span>
            <span class="text-jabatan" id="displayJabatan">Pengurus OSIS</span>
        </div>

        <div class="header-right">
            <div class="brand-name">METEOR 7</div>
            <div class="profile-wrapper" onclick="document.getElementById('uploadFoto').click()">
                <img src="https://via.placeholder.com/150" id="profileImage" alt="Foto Profil">
                <div class="edit-overlay"><i class="fas fa-pen"></i></div>
                <input type="file" id="uploadFoto" hidden accept="image/*" onchange="changeImage(this)">
            </div>
        </div>
    </div>

    <div class="dashboard-body">
        <div class="menu-grid">
            <a href="kas.html" class="menu-item">
                <i class="fas fa-wallet color-kas"></i>
                <span>Keuangan Kas</span>
            </a>
            <a href="proker.html" class="menu-item">
                <i class="fas fa-calendar-check color-proker"></i>
                <span>Proker</span>
            </a>
            <a href="pelanggar.html" class="menu-item">
                <i class="fas fa-user-shield color-pelanggar"></i>
                <span>Pelanggar</span>
            </a>
            <a href="struktur.html" class="menu-item">
                <i class="fas fa-sitemap color-struktur"></i>
                <span>Struktur</span>
            </a>
        </div>

        <h3 style="font-size: 1rem; margin: 10px 0 15px 0; color: #001f3f;">Update Terkini</h3>
        
        <div class="summary-card">
            <h4>📢 Agenda Terdekat</h4>
            <p>Rapat Mingguan Sekbid 1 - Jumat, 15:00 WIB di Ruang OSIS.</p>
        </div>

        <div class="summary-card">
            <h4>💰 Saldo Kas OMET</h4>
            <p>Total saat ini: <b>Rp 150.000</b><br><small>Update terakhir: 2 jam yang lalu</small></p>
        </div>
        
        <div style="height: 80px;"></div>
    </div>

    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-item active">
            <i class="fas fa-home"></i> Home
        </a>
        <a href="testimoni.html" class="nav-item">
            <i class="fas fa-comment-dots"></i> Testimoni
        </a>
    </div>

    <script>
        // Gabungkan semua logika pengambilan data di sini
        const nama = localStorage.getItem('savedNama') || 'Anggota OMET';
        const jabatan = localStorage.getItem('savedJabatan') || 'Anggota OSIS';
        const fotoSaved = localStorage.getItem('savedFoto');

        document.getElementById('displayNama').innerText = nama;
        document.getElementById('displayJabatan').innerText = jabatan;
        
        if(fotoSaved) {
            document.getElementById('profileImage').src = fotoSaved;
        }

        function changeImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const base64Image = e.target.result;
                    document.getElementById('profileImage').src = base64Image;
                    localStorage.setItem('savedFoto', base64Image);
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</body>
</html>
