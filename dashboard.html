<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard OMET</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

       <div class="main-header">
        <div class="user-info-box">
            <span class="text-welcome">Selamat Datang,</span>
            <span class="text-username" id="displayNama">Anggota OMET</span>
            <span class="text-jabatan" id="displayJabatan">Pengurus OSIS</span>
        </div>

        <div class="header-right">
            <div class="brand-name">METEOR 7</div>
            
            <div class="profile-wrapper" onclick="document.getElementById('uploadFoto').click()">
                <img src="https://via.placeholder.com/150" id="profileImage" alt="Foto Profil">
                <div class="edit-overlay">
                    <i class="fas fa-pen"></i>
                </div>
                <input type="file" id="uploadFoto" hidden accept="image/*" onchange="changeImage(this)">
            </div>
        </div>
    </div>

    <script>
        // Mengambil data dari localStorage
        const nama = localStorage.getItem('savedNama') || 'Anggota OMET';
        const jabatan = localStorage.getItem('savedJabatan') || 'Anggota OSIS';
        const fotoSaved = localStorage.getItem('savedFoto');

        // Menampilkan data ke layar
        document.getElementById('displayNama').innerText = nama;
        document.getElementById('displayJabatan').innerText = jabatan;
        if(fotoSaved) {
            document.getElementById('profileImage').src = fotoSaved;
        }

        // Fungsi mengubah foto profil
        function changeImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const base64Image = e.target.result;
                    document.getElementById('profileImage').src = base64Image;
                    // Simpan foto ke localStorage agar tidak hilang saat refresh
                    localStorage.setItem('savedFoto', base64Image);
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>


    <div style="padding: 20px; text-align: center; color: #999; margin-top: 50px;">
        <i class="fas fa-rocket fa-3x" style="margin-bottom: 15px; opacity: 0.3;"></i>
        <p>Belum ada aktivitas hari ini.</p>
    </div>

    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-item active">
            <i class="fas fa-home"></i> Home
        </a>
        <a href="testimoni.html" class="nav-item">
            <i class="fas fa-comment-dots"></i> Testimoni
        </a>
    </div>

    <script>
        // Mengambil nama yang disimpan saat daftar
        const namaUser = localStorage.getItem('savedNama') || 'Anggota';
        document.getElementById('welcomeText').innerHTML = `Selamat datang, <b>${namaUser}</b>`;
    </script>
</body>
</html>
