<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Struktur OMET</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #f8f9fa;">

    <div class="back-header">
        <a href="dashboard.html"><i class="fas fa-arrow-left"></i></a>
        <h2>Struktur Organisasi</h2>
    </div>

    <div class="dashboard-body">
        <div class="struktur-card">
            <img src="https://via.placeholder.com/100" class="avatar-struktur" alt="Ketua">
            <h4 style="color: #001f3f;">Azka Althaf</h4>
            <p style="color: #ffcc00; font-weight: 800; font-size: 0.8rem; text-transform: uppercase;">Ketua OSIS</p>
            <p style="font-size: 0.75rem; color: #888; margin-top: 5px;">"Memimpin dengan aksi, melayani dengan hati."</p>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="struktur-card">
                <h4 style="font-size: 0.9rem;">Ayra Syifa</h4>
                <p style="font-size: 0.7rem; color: #3498db; font-weight: bold;">Wakil Ketua 1</p>
            </div>
            <div class="struktur-card">
                <h4 style="font-size: 0.9rem;">Viola Amara</h4>
                <p style="font-size: 0.7rem; color: #3498db; font-weight: bold;">Wakil Ketua 2</p>
            </div>
        </div>

        <div class="struktur-card" style="margin-top: 10px;">
            <h4 style="font-size: 0.9rem;">Budi Santoso</h4>
            <p style="font-size: 0.7rem; color: #9b59b6; font-weight: bold;">Sekretaris Umum</p>
        </div>
    </div>

    <script>
        const user = JSON.parse(sessionStorage.getItem('userActive'));
        if (!user) { window.location.href = 'index.html'; }
    </script>
</body>
</html>
